<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>MD Viewer — Markdown + Mermaid</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- GitHub Markdown CSS -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">

  <style>
    /* ─── CSS Token System ─── */
    :root {
      --bg:          #f4f6f9;
      --surface:     #ffffff;
      --navbar-bg:   rgba(255,255,255,0.85);
      --border:      #e1e5eb;
      --text:        #1a1d23;
      --text-muted:  #6b7280;
      --accent:      #4f6ef7;
      --accent-soft: #eef1ff;
      --success:     #16a34a;
      --shadow:      0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --radius:      12px;
      --font:        'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --transition:  .2s ease;
    }
    [data-theme="dark"] {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --navbar-bg:   rgba(26,29,39,0.88);
      --border:      #2d3142;
      --text:        #e8eaf0;
      --text-muted:  #8b90a0;
      --accent:      #6d8df9;
      --accent-soft: #1e2340;
      --success:     #4ade80;
      --shadow:      0 1px 4px rgba(0,0,0,.3), 0 4px 20px rgba(0,0,0,.25);
    }

    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    /* ─── Scroll Progress Bar ─── */
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      z-index: 1000;
      transition: width .1s linear;
      border-radius: 0 2px 2px 0;
    }

    /* ─── Navbar ─── */
    #navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navbar-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background var(--transition), border-color var(--transition);
    }
    #navbar .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }
    #navbar .brand svg {
      width: 28px; height: 28px;
      color: var(--accent);
    }
    #navbar .brand-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.3px;
    }
    #navbar .brand-name span { color: var(--accent); }
    #navbar .spacer { flex: 1; }
    #file-info {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--accent-soft);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: .8rem;
      color: var(--accent);
      font-weight: 500;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #file-info svg { width: 14px; height: 14px; flex-shrink: 0; }
    #navbar .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    #navbar .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(-1px);
    }
    #navbar .nav-btn svg { width: 18px; height: 18px; }
    #filePicker { display: none; }

    /* ─── Upload Zone ─── */
    #upload-section {
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #dropzone {
      width: 100%;
      max-width: 600px;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    #dropzone:hover, #dropzone.drag-over {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(79,110,247,.15);
    }
    #dropzone .dz-icon {
      width: 56px; height: 56px;
      margin: 0 auto 16px;
      color: var(--accent);
      opacity: .8;
    }
    #dropzone .dz-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    #dropzone .dz-subtitle {
      font-size: .875rem;
      color: var(--text-muted);
    }
    #dropzone .dz-subtitle em {
      color: var(--accent);
      font-style: normal;
      font-weight: 500;
      cursor: pointer;
    }
    #dropzone .dz-success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #dropzone .dz-success svg {
      width: 48px; height: 48px;
      color: var(--success);
    }
    #dropzone .dz-success-name {
      font-size: .9rem;
      color: var(--success);
      font-weight: 500;
    }
    #dropzone.loaded .dz-default { display: none; }
    #dropzone.loaded .dz-success { display: flex; }

    /* ─── Preview Area ─── */
    #preview-wrapper {
      flex: 1;
      padding: 0 24px 48px;
    }
    #preview {
      max-width: 860px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 48px;
      transition: background var(--transition), box-shadow var(--transition);
    }

    /* ─── Markdown Overrides ─── */
    .markdown-body {
      background: transparent !important;
      color: var(--text) !important;
      font-family: var(--font) !important;
      font-size: .95rem;
      line-height: 1.75;
    }
    .markdown-body h1, .markdown-body h2,
    .markdown-body h3, .markdown-body h4 {
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .markdown-body h1 {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .markdown-body a { color: var(--accent) !important; }
    .markdown-body code {
      background: var(--accent-soft) !important;
      color: var(--accent) !important;
      border-radius: 4px;
      padding: 2px 6px;
    }
    .markdown-body pre {
      background: #1e2336 !important;
      border-radius: 10px !important;
      border: 1px solid var(--border);
    }
    .markdown-body pre code {
      background: transparent !important;
      color: #c9d1d9 !important;
    }
    .markdown-body blockquote {
      border-left: 4px solid var(--accent) !important;
      background: var(--accent-soft);
      border-radius: 0 8px 8px 0;
      color: var(--text-muted) !important;
      padding: 8px 16px;
    }
    .markdown-body table { border-collapse: collapse; width: 100%; }
    .markdown-body table tr { background: var(--surface) !important; color: var(--text) !important; }
    .markdown-body table thead tr { background: var(--accent-soft) !important; }
    .markdown-body table tbody tr:nth-child(even) { background: var(--bg) !important; }
    .markdown-body table th, .markdown-body table td {
      border: 1px solid var(--border) !important;
      padding: 8px 12px;
      color: var(--text) !important;
      background: inherit;
    }
    .markdown-body hr { border-color: var(--border) !important; margin: 24px 0; }
    .mermaid {
      background: #ffffff;
      border-radius: 10px;
      padding: 24px;
      margin: 16px 0;
      overflow-x: auto;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.08);
    }

    /* ─── Back to Top ─── */
    #back-to-top {
      position: fixed;
      bottom: 32px; right: 32px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(79,110,247,.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition), transform var(--transition);
      z-index: 200;
    }
    #back-to-top.visible { opacity: 1; pointer-events: auto; }
    #back-to-top:hover { transform: translateY(-3px); }
    #back-to-top svg { width: 20px; height: 20px; }

    /* ─── TOC Sidebar ─── */
    #toc-sidebar {
      position: fixed;
      top: 60px;
      left: 0;
      width: 260px;
      height: calc(100vh - 60px);
      background: var(--surface);
      border-right: 1px solid var(--border);
      box-shadow: 2px 0 12px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      transform: translateX(-260px);
      transition: transform .25s ease, background var(--transition), border-color var(--transition);
      z-index: 90;
      overflow: hidden;
    }
    #toc-sidebar.open { transform: translateX(0); }
    .toc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toc-title {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    #toc-close {
      width: 28px; height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }
    #toc-close:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    #toc-close svg { width: 14px; height: 14px; }
    #toc-nav {
      overflow-y: auto;
      flex: 1;
      padding: 10px 0 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #toc-nav::-webkit-scrollbar { width: 4px; }
    #toc-nav::-webkit-scrollbar-track { background: transparent; }
    #toc-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    #toc-nav a {
      display: block;
      padding: 5px 16px;
      font-size: .82rem;
      line-height: 1.5;
      color: var(--text-muted);
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: all .15s ease;
      word-break: break-word;
    }
    #toc-nav a.toc-h1 { padding-left: 16px; font-weight: 600; font-size: .85rem; color: var(--text); }
    #toc-nav a.toc-h2 { padding-left: 26px; }
    #toc-nav a.toc-h3 { padding-left: 40px; font-size: .78rem; }
    #toc-nav a:hover {
      color: var(--accent);
      background: var(--accent-soft);
      border-left-color: var(--accent);
    }
    #toc-nav a.active {
      color: var(--accent);
      background: var(--accent-soft);
      border-left-color: var(--accent);
      font-weight: 500;
    }
    /* push main content when sidebar open — desktop only */
    @media (min-width: 769px) {
      body.toc-open #upload-section,
      body.toc-open #preview-wrapper {
        padding-left: 276px;
        transition: padding-left .25s ease;
      }
    }
    /* mobile overlay mode */
    @media (max-width: 768px) {
      #toc-overlay {
        display: none;
        position: fixed;
        inset: 60px 0 0 0;
        background: rgba(0,0,0,.4);
        z-index: 89;
      }
      #toc-overlay.visible { display: block; }
    }
    #btn-toc { display: none; }

    /* ─── Print ─── */
    @media print {
      #progress-bar, #navbar, #upload-section, #back-to-top, #toc-sidebar, #toc-overlay { display: none !important; }
      #preview-wrapper { padding: 0 !important; }
      #preview { max-width: 100%; box-shadow: none; border-radius: 0; padding: 0; }
      body { background: #fff; }
    }

    /* ─── Responsive ─── */
    @media (max-width: 640px) {
      #preview { padding: 24px 20px; }
      #navbar { padding: 0 16px; }
      #upload-section { padding: 20px 16px; }
      #preview-wrapper { padding: 0 16px 32px; }
    }
  </style>
</head>
<body>

<div id="progress-bar"></div>

<nav id="navbar">
  <a class="brand" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
    <span class="brand-name">MD <span>Viewer</span></span>
  </a>

  <div id="file-info">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span id="file-info-name"></span>
  </div>

  <div class="spacer"></div>

  <button class="nav-btn" id="btn-toc" title="章節清單" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="15" y2="12"/>
      <line x1="3" y1="18" x2="18" y2="18"/>
    </svg>
  </button>
  <button class="nav-btn" id="btn-open" title="開啟檔案">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
    </svg>
  </button>
  <button class="nav-btn" id="btn-theme" title="切換深色模式">
    <svg id="icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg id="icon-light" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>
  <button class="nav-btn" id="btn-print" title="列印">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
  </button>

  <input type="file" id="filePicker" accept=".md,text/markdown"/>
</nav>

<aside id="toc-sidebar">
  <div class="toc-header">
    <span class="toc-title">章節清單</span>
    <button id="toc-close" title="關閉">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <nav id="toc-nav"></nav>
</aside>
<div id="toc-overlay"></div>

<div id="upload-section">
  <div id="dropzone">
    <div class="dz-default">
      <svg class="dz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 16 12 12 8 16"/>
        <line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
      </svg>
      <div class="dz-title">拖曳 Markdown 檔案至此</div>
      <div class="dz-subtitle">支援 <strong>.md</strong> 格式 &nbsp;·&nbsp; 或 <em id="dz-click">點擊選擇檔案</em></div>
    </div>
    <div class="dz-success">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <div class="dz-success-name" id="dz-filename"></div>
    </div>
  </div>
</div>

<div id="preview-wrapper" style="display:none">
  <div id="preview" class="markdown-body"></div>
</div>

<button id="back-to-top" title="回到頂部">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="19" x2="12" y2="5"/>
    <polyline points="5 12 12 5 19 12"/>
  </svg>
</button>

<script type="module">
  import { marked } from "https://cdn.jsdelivr.net/npm/marked@17.0.3/lib/marked.esm.js";
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

  const isDark = () => document.documentElement.dataset.theme === "dark";

  function initMermaid() {
    mermaid.initialize({ startOnLoad: false, securityLevel: "loose", theme: "default" });
  }
  initMermaid();

  const preview        = document.getElementById("preview");
  const previewWrapper = document.getElementById("preview-wrapper");
  const filePicker     = document.getElementById("filePicker");
  const dropzone       = document.getElementById("dropzone");
  const progressBar    = document.getElementById("progress-bar");
  const backToTop      = document.getElementById("back-to-top");
  const fileInfo       = document.getElementById("file-info");
  const fileInfoName   = document.getElementById("file-info-name");
  const dzFilename     = document.getElementById("dz-filename");
  const uploadSection  = document.getElementById("upload-section");

  // ─── File Reading ───
  function readFile(file) {
    const reader = new FileReader();
    reader.onload = () => renderMarkdown(reader.result, file.name);
    reader.readAsText(file);
  }

  // ─── Open Buttons ───
  document.getElementById("btn-open").addEventListener("click", () => filePicker.click());
  document.getElementById("dz-click").addEventListener("click", () => filePicker.click());
  filePicker.addEventListener("change", (e) => {
    if (e.target.files.length > 0) readFile(e.target.files[0]);
  });

  // ─── Drag & Drop ───
  dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("drag-over"); });
  dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-over"));
  dropzone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropzone.classList.remove("drag-over");
    if (e.dataTransfer.files.length > 0) readFile(e.dataTransfer.files[0]);
  });

  // ─── Render ───
  async function renderMarkdown(mdText, filename) {
    dropzone.classList.add("loaded");
    dzFilename.textContent = filename || "";
    fileInfoName.textContent = filename || "";
    fileInfo.style.display = "flex";
    uploadSection.style.display = "none";
    previewWrapper.style.display = "block";

    preview.innerHTML = marked.parse(mdText);

    // Mermaid blocks
    const nodes = [];
    preview.querySelectorAll("pre code[class*='mermaid']").forEach(codeEl => {
      const text = codeEl.textContent.trim();
      const div = document.createElement("div");
      div.className = "mermaid";
      div.textContent = text;
      codeEl.parentElement.replaceWith(div);
      nodes.push(div);
    });
    if (nodes.length) {
      initMermaid();
      for (const node of nodes) {
        try {
          await mermaid.run({ nodes: [node] });
        } catch (e) {
          console.warn("Mermaid diagram skipped:", e);
          node.style.cssText = "border:1px solid #f66;padding:8px;border-radius:6px;color:#c33;font-size:.8rem;";
          node.textContent = "⚠ 圖表解析失敗：" + (e.message || e);
        }
      }
    }

    buildToc();
    previewWrapper.scrollIntoView({ behavior: "smooth" });
  }

  // ─── TOC ───
  const tocSidebar = document.getElementById("toc-sidebar");
  const tocNav     = document.getElementById("toc-nav");
  const tocClose   = document.getElementById("toc-close");
  const tocOverlay = document.getElementById("toc-overlay");
  const btnToc     = document.getElementById("btn-toc");
  let tocHeadings  = [];

  function openToc()  { tocSidebar.classList.add("open"); document.body.classList.add("toc-open"); tocOverlay.classList.add("visible"); }
  function closeToc() { tocSidebar.classList.remove("open"); document.body.classList.remove("toc-open"); tocOverlay.classList.remove("visible"); }

  btnToc.addEventListener("click", () => tocSidebar.classList.contains("open") ? closeToc() : openToc());
  tocClose.addEventListener("click", closeToc);
  tocOverlay.addEventListener("click", closeToc);

  function buildToc() {
    tocHeadings = [...preview.querySelectorAll("h1, h2, h3")];
    tocNav.innerHTML = "";
    if (tocHeadings.length === 0) { btnToc.style.display = "none"; return; }

    tocHeadings.forEach((h, i) => {
      if (!h.id) h.id = "heading-" + i;
      const a = document.createElement("a");
      a.href = "#" + h.id;
      a.textContent = h.textContent;
      a.className = "toc-" + h.tagName.toLowerCase();
      a.addEventListener("click", (e) => {
        e.preventDefault();
        const navbarH = 60 + 12; // navbar height + breathing room
        const top = h.getBoundingClientRect().top + window.scrollY - navbarH;
        window.scrollTo({ top, behavior: "smooth" });
        // close on mobile
        if (window.innerWidth <= 768) closeToc();
      });
      tocNav.appendChild(a);
    });

    btnToc.style.display = "flex";
    openToc();
  }

  function updateScrollspy() {
    if (tocHeadings.length === 0) return;
    const offset = 80;
    let activeIdx = -1;
    tocHeadings.forEach((h, i) => {
      if (h.getBoundingClientRect().top <= offset) activeIdx = i;
    });
    const links = tocNav.querySelectorAll("a");
    links.forEach((a, i) => a.classList.toggle("active", i === activeIdx));
    if (activeIdx >= 0) {
      const active = links[activeIdx];
      const navTop = tocNav.scrollTop;
      const navH   = tocNav.clientHeight;
      const elTop  = active.offsetTop;
      const elH    = active.clientHeight;
      if (elTop < navTop || elTop + elH > navTop + navH) {
        tocNav.scrollTo({ top: elTop - navH / 2 + elH / 2, behavior: "smooth" });
      }
    }
  }

  // ─── Scroll Progress + Back to Top ───
  window.addEventListener("scroll", () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    progressBar.style.width = docHeight > 0 ? (scrollTop / docHeight * 100) + "%" : "0%";
    backToTop.classList.toggle("visible", scrollTop > 300);
    updateScrollspy();
  });
  backToTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

  // ─── Print ───
  document.getElementById("btn-print").addEventListener("click", () => window.print());

  // ─── Theme Toggle ───
  const iconDark  = document.getElementById("icon-dark");
  const iconLight = document.getElementById("icon-light");

  function applyTheme(dark) {
    document.documentElement.dataset.theme = dark ? "dark" : "light";
    iconDark.style.display  = dark ? "none" : "";
    iconLight.style.display = dark ? ""     : "none";
    localStorage.setItem("md-viewer-theme", dark ? "dark" : "light");
  }

  const saved = localStorage.getItem("md-viewer-theme");
  if (saved) applyTheme(saved === "dark");
  else if (window.matchMedia("(prefers-color-scheme: dark)").matches) applyTheme(true);

  document.getElementById("btn-theme").addEventListener("click", () => applyTheme(!isDark()));
</script>

</body>
